name: ci

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  SCCACHE_GHA_ENABLED: true
  RUSTC_WRAPPER: sccache

jobs:
  rust-coverage:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rust-analyzer, rust-src

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - uses: cargo-bins/cargo-binstall@main

      - name: Install cargo-llvm-cov
        shell: bash
        run: cargo binstall cargo-llvm-cov --locked --no-confirm

      - name: Run coverage
        shell: bash
        run: |
          cargo llvm-cov clean --workspace
          cargo llvm-cov --workspace --all-features --all-targets --cobertura --output-path=target/cobertura.xml

      - name: Codecov publish
        uses: codecov/codecov-action@v7
        with:
          files: target/cobertura.xml
          disable_search: true
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Codecov housekeeping
        shell: bash
        run: |
          rm -f codecov codecov.SHA256SUM codecov.SHA256SUM.sig
